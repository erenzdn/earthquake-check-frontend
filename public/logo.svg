<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Degrade - Dikey Bina Sütunları İçin -->
    <linearGradient id="pillarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b61c9" />
      <stop offset="100%" stop-color="#0a2a5e" />
    </linearGradient>

    <!-- Degrade - Sismik Dalga ve Onay İşareti İçin -->
    <linearGradient id="waveGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Gölge/Işıma Efekti - Sismik Dalganın Öne Çıkması İçin -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#06b6d4" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Zemin Hattı (Hafif Şeffaf Temel) -->
  <rect x="95" y="380" width="270" height="10" rx="5" fill="#1b61c9" opacity="0.15" />

  <!-- Bina Sütunları (Güven ve Sağlamlık) -->
  <!-- 1. Sol Sütun -->
  <rect x="125" y="190" width="50" height="190" rx="15" fill="url(#pillarGrad)" />
  <!-- 2. Orta Sütun (Daha Yüksek) -->
  <rect x="205" y="120" width="50" height="260" rx="15" fill="url(#pillarGrad)" />
  <!-- 3. Sağ Sütun -->
  <rect x="285" y="160" width="50" height="220" rx="15" fill="url(#pillarGrad)" />

  <!-- Akıllı Şehir / Teknoloji Detayları (Işıldayan Pencereler) -->
  <!-- Sol Sütun Pencereleri -->
  <rect x="142" y="225" width="16" height="16" rx="4" fill="#ffffff" opacity="0.4" />
  <rect x="142" y="275" width="16" height="16" rx="4" fill="#ffffff" opacity="0.4" />
  <rect x="142" y="325" width="16" height="16" rx="4" fill="#ffffff" opacity="0.4" />

  <!-- Orta Sütun Pencereleri -->
  <rect x="222" y="155" width="16" height="16" rx="4" fill="#ffffff" opacity="0.5" />
  <rect x="222" y="205" width="16" height="16" rx="4" fill="#ffffff" opacity="0.5" />
  <rect x="222" y="255" width="16" height="16" rx="4" fill="#ffffff" opacity="0.5" />
  <rect x="222" y="305" width="16" height="16" rx="4" fill="#ffffff" opacity="0.5" />

  <!-- Sağ Sütun Pencereleri -->
  <rect x="302" y="195" width="16" height="16" rx="4" fill="#ffffff" opacity="0.4" />
  <rect x="302" y="245" width="16" height="16" rx="4" fill="#ffffff" opacity="0.4" />
  <rect x="302" y="295" width="16" height="16" rx="4" fill="#ffffff" opacity="0.4" />
  <rect x="302" y="345" width="16" height="16" rx="4" fill="#ffffff" opacity="0.4" />

  <!-- Dinamik Sismik Dalga ve Onay İşareti (Earthquake + Check) -->
  <path d="M 50 300 L 95 300 L 150 210 L 190 340 L 230 80 L 270 410 L 310 250 L 360 320 L 455 150"
        stroke="url(#waveGrad)"
        stroke-width="26"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        filter="url(#glow)" />
</svg>